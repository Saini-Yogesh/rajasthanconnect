<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Meta Tags -->
    <title>Rajasthan Connect — Connecting Heritage, Tour Guides & Stays</title>
    <meta
      name="description"
      content="Discover Rajasthan's rich culture, book local verified tour guides, reserve heritage stays, and explore majestic sand dunes. Your direct gateway to the land of kings."
    />
    <meta
      name="keywords"
      content="Rajasthan connect, Rajasthan tour guides, Jaisalmer camel safari, Udaipur heritage hotels, Jaipur local guide, Rajasthan artisans, Blue pottery Jaipur, Dal Baati Churma, Rajasthan tourism portal"
    />
    <meta name="author" content="Rajasthan Connect" />
    <link rel="canonical" href="https://www.rajasthanconnect.in/" />

    <!-- Open Graph / Facebook (WhatsApp link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.rajasthanconnect.in/" />
    <meta
      property="og:title"
      content="Rajasthan Connect — Connecting Heritage, Tour Guides & Stays"
    />
    <meta
      property="og:description"
      content="Connect directly with verified tour guides, local craftspeople, and heritage boutique stays across Rajasthan."
    />
    <meta
      property="og:image"
      content="https://www.rajasthanconnect.in/images/jaipur.png"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.rajasthanconnect.in/" />
    <meta
      property="twitter:title"
      content="Rajasthan Connect — Connecting Heritage, Tour Guides & Stays"
    />
    <meta
      property="twitter:description"
      content="Connect directly with verified tour guides, local craftspeople, and heritage boutique stays across Rajasthan."
    />
    <meta
      property="twitter:image"
      content="https://www.rajasthanconnect.in/images/jaipur.png"
    />

    <!-- Structured JSON-LD Data for Google Rich Snippets -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Rajasthan Connect",
        "url": "https://www.rajasthanconnect.in/",
        "description": "Connecting tourists with certified tour guides, heritage stays, local artisans, and experiences in Rajasthan.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://www.rajasthanconnect.in/?search={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "TravelAgency",
        "name": "Rajasthan Connect",
        "image": "https://www.rajasthanconnect.in/images/jaipur.png",
        "priceRange": "$$",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Jaipur",
          "addressRegion": "Rajasthan",
          "addressCountry": "IN"
        },
        "url": "https://www.rajasthanconnect.in/"
      }
    </script>
    <meta
      name="google-site-verification"
      content="bbeUh9qz3JRX393M4xYGV7QUBatmrkSaLRJzvR_Bj3A"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
