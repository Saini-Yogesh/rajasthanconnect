    <!-- Structured JSON-LD Data for Google Rich Snippets -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Rajasthan Connect",
        "url": "https://www.rajasthanconnect.in/",
        "description": "Connecting tourists with certified tour guides, heritage stays, local artisans, and experiences in Rajasthan.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://www.rajasthanconnect.in/?search={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "TravelAgency",
        "name": "Rajasthan Connect",
        "image": "https://www.rajasthanconnect.in/images/jaipur.webp",
        "priceRange": "$$",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Jaipur",
          "addressRegion": "Rajasthan",
          "addressCountry": "IN"
        },

    <!-- Instant Render App Loader -->
    <style>
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #0b091a; /* Matches your theme background */
        font-family: 'Inter', sans-serif;
      }
      #root:empty::after {
        content: "";
        width: 36px;
        height: 36px;
        border: 3px solid rgba(255, 255, 255, 0.08);
        border-top-color: #ea580c; /* Royal orange accent color */
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
